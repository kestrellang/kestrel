[package]
name = "swoop"
version = "0.1.2"
description = "HTTP client library for Kestrel"
author = "jkpdino"
license = "MIT"
repository = "https://github.com/jkpdino/kestrel"

[dependencies]
"kestrel/http" = "0.1.0"
"kestrel/quill" = "0.1.0"
"kestrel/quill-json" = "0.1.0"

[build]
link = ["ssl", "crypto"]
link-cmd = "brew --prefix openssl@3 | xargs -I{} echo -L{}/lib"
