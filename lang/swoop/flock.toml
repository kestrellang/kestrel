[package]
name = "swoop"
version = "0.2.1"
description = "HTTP client library for Kestrel"
author = "jkpdino"
license = "MIT"
repository = "https://github.com/kestrellang/kestrel"

[dependencies]
kestrel/http = { version = "0.2.1" }
kestrel/quill = { version = "0.2.1" }
kestrel/quill-json = { version = "0.2.1" }

[build]
link = ["ssl", "crypto"]
link-cmd = "brew --prefix openssl@3 | xargs -I{} echo -L{}/lib"
