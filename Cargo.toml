[package]
name = "kestrel"
version.workspace = true
edition.workspace = true

[dependencies]
kestrel-lexer = { path = "lib/kestrel-lexer" }
kestrel-parser = { path = "lib/kestrel-parser" }
kestrel-syntax-tree = { path = "lib/kestrel-syntax-tree" }
kestrel-semantic-tree = { path = "lib/kestrel-semantic-tree" }
kestrel-semantic-tree-builder = { path = "lib/kestrel-semantic-tree-builder" }
kestrel-semantic-tree-binder = { path = "lib/kestrel-semantic-tree-binder" }
kestrel-compiler = { path = "lib/kestrel-compiler" }
kestrel-reporting = { path = "lib/kestrel-reporting" }
kestrel-span = { path = "lib/kestrel-span" }
semantic-tree = { path = "lib/semantic-tree" }
clap = { workspace = true }

[workspace.package]
version = "0.9.0"
edition = "2024"

[workspace.dependencies]
chumsky = "0.12"
clap = { version = "4.5.53", features = ["derive"] }
codespan-reporting = "0.13.1"
downcast-rs = "2.0.2"
logos = "0.16.0"
parking_lot = "0.12.5"
rowan = "0.16.1"
unicode-xid = "0.2"


[workspace]
members = [
    "lib/kestrel-span",
    "lib/kestrel-prelude",
    "lib/kestrel-lexer",
    "lib/kestrel-parser",
    "lib/kestrel-syntax-tree",
    "lib/semantic-tree",
    "lib/kestrel-semantic-tree",
    "lib/kestrel-semantic-model",
    "lib/kestrel-semantic-analyzers",
    "lib/kestrel-semantic-tree-builder",
    "lib/kestrel-semantic-tree-binder",
    "lib/kestrel-semantic-type-inference",
    "lib/kestrel-semantic-pattern-matching",
    "lib/kestrel-reporting",
    "lib/kestrel-compiler",
    "lib/kestrel-execution-graph",
    "lib/kestrel-execution-graph-lowering",
    "lib/kestrel-test-suite"
]
