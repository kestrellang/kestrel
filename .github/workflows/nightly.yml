name: Nightly Release

on:
  workflow_dispatch:
  push:
    branches: [nightly]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_release-build.yml

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly \
            --title "Nightly $DATE" \
            --notes "Automated nightly build from the \`nightly\` branch.

          **Commit:** $COMMIT_SHA
          **Date:** $DATE

          ## Install

          \`\`\`sh
          curl --proto '=https' --tlsv1.2 -sSf https://kestrel-lang.com/install.sh | sh
          \`\`\`

          Or download the toolchain tarball for your platform below." \
            --prerelease \
            --target nightly \
            artifacts/kestrel-*.tar.gz \
            artifacts/jessup-*.tar.gz
