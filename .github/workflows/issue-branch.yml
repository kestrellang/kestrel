name: Create Issue Branch

# Fires when the start-signal label (default `in-progress`) is added to an
# issue — that's the explicit "I'm starting this" signal. Creates the
# feature/fix/etc. branch off nightly and opens a draft PR.
#
# Why a label and not a Project card move: GitHub Actions cannot be
# triggered by Projects v2 events (`projects_v2_item` is an org/user webhook
# event, not a workflow trigger). So the start signal is a label instead.
# Add the `in-progress` label by hand, or wire a Project automation to apply
# it when a card moves to In Progress, to kick this off.
#
# Override the label name with a `TRIGGER_LABEL` repository variable.

on:
  issues:
    types: [labeled]

jobs:
  create-branch:
    # Only when the label that was just added is our start signal.
    if: ${{ github.event.label.name == (vars.TRIGGER_LABEL || 'in-progress') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout nightly
        uses: actions/checkout@v4
        with:
          ref: nightly
          fetch-depth: 0

      - name: Determine branch prefix
        id: prefix
        env:
          # JSON array of this issue's label names, e.g. ["bug","in-progress"].
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -qw "bug"; then
            echo "prefix=fix" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw "refactor"; then
            echo "prefix=refactor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw "chore"; then
            echo "prefix=chore" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=feature" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch name
        id: branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PREFIX: ${{ steps.prefix.outputs.prefix }}
        run: |
          SANITIZED=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
          ISSUE_NUM_PADDED=$(printf "%04d" "$ISSUE_NUMBER")
          BRANCH="${PREFIX}/${ISSUE_NUM_PADDED}-${SANITIZED}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Skip if branch already exists
        id: existing
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch $BRANCH_NAME already exists, skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: ${{ steps.existing.outputs.exists == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and issue file
        if: ${{ steps.existing.outputs.exists == 'false' }}
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_CREATED: ${{ github.event.issue.created_at }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          git checkout -b "$BRANCH_NAME"
          mkdir -p .issues

          # Write the file via python so user-controlled title/body never
          # reach the shell (no expansion / no injection).
          python3 - <<'PY'
          import os, pathlib
          n = os.environ["ISSUE_NUMBER"]
          path = pathlib.Path(".issues") / f"{n}.md"
          path.write_text(
              f"# Issue #{n}: {os.environ['ISSUE_TITLE']}\n\n"
              f"**Author:** @{os.environ['ISSUE_AUTHOR']}\n"
              f"**Created:** {os.environ['ISSUE_CREATED']}\n"
              f"**URL:** {os.environ['ISSUE_URL']}\n\n"
              f"## Description\n\n"
              f"{os.environ.get('ISSUE_BODY') or ''}\n"
          )
          PY

          git add ".issues/${ISSUE_NUMBER}.md"
          git commit -m "issue: add description for #${ISSUE_NUMBER}"
          git push origin "$BRANCH_NAME"

      - name: Create draft PR
        if: ${{ steps.existing.outputs.exists == 'false' }}
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          PREFIX: ${{ steps.prefix.outputs.prefix }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const branch = process.env.BRANCH_NAME;
            const prefix = process.env.PREFIX;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${prefix}: ${title}`,
              head: branch,
              base: 'nightly',
              body: `Closes #${issueNumber}\n\n## Summary\n\n_Describe your changes here_\n\n## Test Plan\n\n- [ ] Tests pass\n- [ ] Formatted with \`cargo fmt\`\n- [ ] No clippy warnings`,
              draft: true,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Branch created: \`${branch}\`\nDraft PR: ${pr.data.html_url}\n\nTo start working:\n\`\`\`bash\ngit fetch origin\ngit checkout ${branch}\n\`\`\``,
            });
