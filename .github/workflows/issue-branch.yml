name: Create Issue Branch

# Fires when an issue's Project Status moves to "In Progress" — that's
# the explicit "I'm starting this" signal. Creates the feature/fix/etc.
# branch off nightly and opens a draft PR.
#
# Bulk-imported issues stay in Backlog and never trigger this. Real
# work-starting happens by dragging the card into In Progress.

on:
  projects_v2_item:
    types: [edited]

jobs:
  guard:
    runs-on: ubuntu-latest
    if: ${{ vars.PROJECT_ID != '' && github.event.projects_v2_item.content_type == 'Issue' }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      issue_node_id: ${{ steps.check.outputs.issue_node_id }}
    steps:
      - name: Check Status transition
        id: check
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          EVENT_PROJECT_ID: ${{ github.event.projects_v2_item.project_node_id }}
          OUR_PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          IN_PROGRESS_ID: ${{ vars.PROJECT_STATUS_IN_PROGRESS_ID }}
          ITEM_ID: ${{ github.event.projects_v2_item.node_id }}
          CONTENT_NODE_ID: ${{ github.event.projects_v2_item.content_node_id }}
          # The event payload's `changes` block tells us what actually
          # changed in this edit. We only care about Status moving TO
          # In Progress — anything else, bail.
          CHANGE_FIELD_ID: ${{ github.event.changes.field_value.field_node_id }}
          CHANGE_TO_ID: ${{ github.event.changes.field_value.to.id }}
        run: |
          set -euo pipefail

          # Only our project.
          if [ "$EVENT_PROJECT_ID" != "$OUR_PROJECT_ID" ]; then
            echo "Project mismatch ($EVENT_PROJECT_ID != $OUR_PROJECT_ID), skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only Status field changes to In Progress.
          if [ "$CHANGE_FIELD_ID" != "$STATUS_FIELD_ID" ] || [ "$CHANGE_TO_ID" != "$IN_PROGRESS_ID" ]; then
            echo "Not a Status→In Progress transition, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve the issue's number from its node ID.
          ISSUE_NUMBER=$(gh api graphql \
            -f query='query($id: ID!) { node(id: $id) { ... on Issue { number } } }' \
            -F id="$CONTENT_NODE_ID" \
            --jq '.data.node.number')

          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "null" ]; then
            echo "Could not resolve issue number from $CONTENT_NODE_ID"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_node_id=$CONTENT_NODE_ID" >> "$GITHUB_OUTPUT"

  create-branch:
    needs: guard
    if: ${{ needs.guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout nightly
        uses: actions/checkout@v4
        with:
          ref: nightly
          fetch-depth: 0

      - name: Fetch issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          ISSUE_NUMBER: ${{ needs.guard.outputs.issue_number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          DATA=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $n: Int!) { repository(owner: $owner, name: $repo) { issue(number: $n) { title body url createdAt author { login } labels(first: 30) { nodes { name } } } } }' \
            -F owner="$REPO_OWNER" \
            -F repo="$REPO_NAME" \
            -F n="$ISSUE_NUMBER")
          echo "$DATA" > /tmp/issue.json

          TITLE=$(python3 -c 'import json,sys;print(json.load(sys.stdin)["data"]["repository"]["issue"]["title"])' < /tmp/issue.json)
          AUTHOR=$(python3 -c 'import json,sys;d=json.load(sys.stdin)["data"]["repository"]["issue"];print((d.get("author") or {}).get("login","unknown"))' < /tmp/issue.json)
          CREATED=$(python3 -c 'import json,sys;print(json.load(sys.stdin)["data"]["repository"]["issue"]["createdAt"])' < /tmp/issue.json)
          URL=$(python3 -c 'import json,sys;print(json.load(sys.stdin)["data"]["repository"]["issue"]["url"])' < /tmp/issue.json)
          LABELS=$(python3 -c 'import json,sys;print(",".join(n["name"] for n in json.load(sys.stdin)["data"]["repository"]["issue"]["labels"]["nodes"]))' < /tmp/issue.json)

          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
            echo "author=$AUTHOR"
            echo "created=$CREATED"
            echo "url=$URL"
            echo "labels=$LABELS"
          } >> "$GITHUB_OUTPUT"

      - name: Determine branch prefix
        id: prefix
        env:
          LABELS: ${{ steps.issue.outputs.labels }}
        run: |
          if echo "$LABELS" | grep -qw "bug"; then
            echo "prefix=fix" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw "refactor"; then
            echo "prefix=refactor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw "chore"; then
            echo "prefix=chore" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=feature" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch name
        id: branch
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ needs.guard.outputs.issue_number }}
          PREFIX: ${{ steps.prefix.outputs.prefix }}
        run: |
          SANITIZED=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
          ISSUE_NUM_PADDED=$(printf "%04d" "$ISSUE_NUMBER")
          BRANCH="${PREFIX}/${ISSUE_NUM_PADDED}-${SANITIZED}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Skip if branch already exists
        id: existing
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch $BRANCH_NAME already exists, skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: ${{ steps.existing.outputs.exists == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and issue file
        if: ${{ steps.existing.outputs.exists == 'false' }}
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          ISSUE_NUMBER: ${{ needs.guard.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          ISSUE_CREATED: ${{ steps.issue.outputs.created }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
        run: |
          git checkout -b "$BRANCH_NAME"
          mkdir -p .issues

          # Fetch the body separately and write the file via python (no shell expansion of user input).
          python3 - <<'PY'
          import json, os, pathlib
          n = os.environ["ISSUE_NUMBER"]
          with open("/tmp/issue.json") as f:
              issue = json.load(f)["data"]["repository"]["issue"]
          path = pathlib.Path(".issues") / f"{n}.md"
          path.write_text(
              f"# Issue #{n}: {os.environ['ISSUE_TITLE']}\n\n"
              f"**Author:** @{os.environ['ISSUE_AUTHOR']}\n"
              f"**Created:** {os.environ['ISSUE_CREATED']}\n"
              f"**URL:** {os.environ['ISSUE_URL']}\n\n"
              f"## Description\n\n"
              f"{issue.get('body') or ''}\n"
          )
          PY

          git add ".issues/${ISSUE_NUMBER}.md"
          git commit -m "issue: add description for #${ISSUE_NUMBER}"
          git push origin "$BRANCH_NAME"

      - name: Create draft PR
        if: ${{ steps.existing.outputs.exists == 'false' }}
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ needs.guard.outputs.issue_number }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          PREFIX: ${{ steps.prefix.outputs.prefix }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const branch = process.env.BRANCH_NAME;
            const prefix = process.env.PREFIX;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${prefix}: ${title}`,
              head: branch,
              base: 'nightly',
              body: `Closes #${issueNumber}\n\n## Summary\n\n_Describe your changes here_\n\n## Test Plan\n\n- [ ] Tests pass\n- [ ] Formatted with \`cargo fmt\`\n- [ ] No clippy warnings`,
              draft: true,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Branch created: \`${branch}\`\nDraft PR: ${pr.data.html_url}\n\nTo start working:\n\`\`\`bash\ngit fetch origin\ngit checkout ${branch}\n\`\`\``,
            });
