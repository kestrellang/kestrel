name: CI

on:
  pull_request:
  push:
    branches: [main, nightly, beta]

env:
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned toolchain
        id: rust
        run: echo "channel=$(sed -n 's/.*channel = "\([^"]*\)".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --workspace --lib --bins --examples -- -D warnings

      - name: Rust build
        run: cargo build --workspace

      - name: Rust test
        # Exclude the .ks suite: it documents in-progress compiler state (need
        # not all pass) and some cases hit debug-only rowan asserts that don't
        # fire in release. It runs in release via the `triage` tool as a
        # non-blocking signal, so the hard gate here is the Rust unit tests.
        run: cargo test --workspace --exclude kestrel-test-suite

      - name: kestrel-lsp release build
        run: cargo build -p kestrel-lsp --release

  # Exercises the flock + jessup bootstrap path on PRs, where it previously
  # wasn't tested until a release build ran. Uses the same composite action
  # as the release workflows, so a break here is a break there.
  bootstrap:
    name: Bootstrap smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain
        uses: ./.github/actions/build-toolchain
        with:
          profile: release
