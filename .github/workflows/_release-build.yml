name: Build release artifacts

# Reusable build: compiles the toolchain on every target, packages the
# tarballs, and uploads them as artifacts. Called by nightly.yml, beta.yml
# and release.yml so the build/package logic lives in exactly one place.

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain
        uses: ./.github/actions/build-toolchain
        with:
          profile: release

      - name: Package toolchain tarball
        run: |
          STAGING="kestrel-${{ matrix.target }}"
          mkdir -p "$STAGING/bin" "$STAGING/lib"
          cp target/release/kestrel "$STAGING/bin/"
          cp target/release/kestrel-lsp "$STAGING/bin/"
          cp target/release/kestrel-doc "$STAGING/bin/"
          cp lang/flock/flock "$STAGING/bin/"
          cp -r lang/std "$STAGING/lib/std"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package jessup binary
        run: |
          STAGING="jessup-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp lang/jessup/jessup "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            kestrel-${{ matrix.target }}.tar.gz
            jessup-${{ matrix.target }}.tar.gz
