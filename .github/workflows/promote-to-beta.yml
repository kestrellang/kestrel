name: Open beta promotion PR

# Opens (or reuses) the nightly -> beta pull request that cuts a release-train
# cycle. The promotion IS the PR merge: merge it with "Create a merge commit"
# to preserve the cycle boundary in history, and project-status.yml then moves
# every Nightly card to Beta. See docs/contributing/git.md.

on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone being promoted (e.g. "0.16") — used in the PR title'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Open nightly to beta PR
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MILESTONE: ${{ inputs.milestone }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --repo "$REPO" --base beta --head nightly --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Promotion PR already open: #$existing"
            exit 0
          fi
          gh pr create --repo "$REPO" --base beta --head nightly \
            --title "Promote ${MILESTONE} to beta" \
            --body "Cuts the **${MILESTONE}** stabilization cycle: merges \`nightly\` into \`beta\`.

          Merge with **Create a merge commit** (not squash) to keep the cycle boundary in history.
          On merge, \`project-status.yml\` moves every **Nightly** card to **Beta**."
