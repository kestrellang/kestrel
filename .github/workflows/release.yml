name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_release-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # gh release create needs a git repo context (resolves the repo/tag).
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        # Idempotent: a re-pushed/moved tag must republish, not fail. `gh release
        # create` errors if the release already exists, so on re-runs we update
        # the existing release and clobber its assets with the freshly-built ones.
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "Kestrel $TAG_NAME" --latest
            gh release upload "$TAG_NAME" \
              artifacts/kestrel-*.tar.gz \
              artifacts/jessup-*.tar.gz \
              --clobber
          else
            gh release create "$TAG_NAME" \
              --title "Kestrel $TAG_NAME" \
              --generate-notes \
              --latest \
              artifacts/kestrel-*.tar.gz \
              artifacts/jessup-*.tar.gz
          fi
