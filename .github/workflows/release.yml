name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_release-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # gh release create needs a git repo context (resolves the repo/tag).
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Kestrel $TAG_NAME" \
            --generate-notes \
            --latest \
            artifacts/kestrel-*.tar.gz \
            artifacts/jessup-*.tar.gz
