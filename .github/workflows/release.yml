name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-apple-darwin-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            aarch64-apple-darwin-cargo-release-

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Build kestrel compiler
        run: cargo build --release

      - name: Build kestrel language server
        run: cargo build --release -p kestrel-lsp

      - name: Build kestrel-doc
        run: cargo build --release -p kestrel-doc

      - name: Bootstrap flock
        run: bash lang/flock/bootstrap.sh

      - name: Build jessup
        working-directory: lang/jessup
        run: |
          # Build via flock (reads flock.toml) — robust vs the hand-maintained
          # file list in bootstrap.sh, which drifts (renamed/added .ks files).
          # flock is bootstrapped in the prior step.
          rm -f jessup
          KESTREL=../../target/release/kestrel KESTREL_STD=../std ../../lang/flock/flock build
          test -f jessup || { echo "ERROR: jessup binary not produced"; exit 1; }
          file jessup

      - name: Package toolchain tarball
        run: |
          STAGING="kestrel-aarch64-apple-darwin"
          mkdir -p "$STAGING/bin" "$STAGING/lib"
          cp target/release/kestrel "$STAGING/bin/"
          cp target/release/kestrel-lsp "$STAGING/bin/"
          cp target/release/kestrel-doc "$STAGING/bin/"
          cp lang/flock/flock "$STAGING/bin/"
          cp -r lang/std "$STAGING/lib/std"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package jessup binary
        run: |
          STAGING="jessup-aarch64-apple-darwin"
          mkdir -p "$STAGING"
          cp lang/jessup/jessup "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64-apple-darwin
          path: |
            kestrel-aarch64-apple-darwin.tar.gz
            jessup-aarch64-apple-darwin.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
            target
          key: x86_64-unknown-linux-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            x86_64-unknown-linux-cargo-release-

      - name: Build kestrel compiler
        run: cargo build --release

      - name: Build kestrel language server
        run: cargo build --release -p kestrel-lsp

      - name: Build kestrel-doc
        run: cargo build --release -p kestrel-doc

      - name: Bootstrap flock
        run: bash lang/flock/bootstrap.sh

      - name: Build jessup
        working-directory: lang/jessup
        run: |
          # Build via flock (reads flock.toml) — robust vs the hand-maintained
          # file list in bootstrap.sh, which drifts (renamed/added .ks files).
          # flock is bootstrapped in the prior step.
          rm -f jessup
          KESTREL=../../target/release/kestrel KESTREL_STD=../std ../../lang/flock/flock build
          test -f jessup || { echo "ERROR: jessup binary not produced"; exit 1; }
          file jessup

      - name: Package toolchain tarball
        run: |
          STAGING="kestrel-x86_64-unknown-linux"
          mkdir -p "$STAGING/bin" "$STAGING/lib"
          cp target/release/kestrel "$STAGING/bin/"
          cp target/release/kestrel-lsp "$STAGING/bin/"
          cp target/release/kestrel-doc "$STAGING/bin/"
          cp lang/flock/flock "$STAGING/bin/"
          cp -r lang/std "$STAGING/lib/std"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package jessup binary
        run: |
          STAGING="jessup-x86_64-unknown-linux"
          mkdir -p "$STAGING"
          cp lang/jessup/jessup "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-unknown-linux
          path: |
            kestrel-x86_64-unknown-linux.tar.gz
            jessup-x86_64-unknown-linux.tar.gz

  release:
    needs: [build-macos, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Kestrel $TAG_NAME" \
            --generate-notes \
            --latest \
            artifacts/kestrel-*.tar.gz \
            artifacts/jessup-*.tar.gz

  project-done:
    needs: [release]
    runs-on: ubuntu-latest
    if: ${{ vars.PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve milestone from tag
        id: milestone
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MILESTONE=$(echo "$TAG_NAME" | sed -E 's/^v([0-9]+\.[0-9]+).*/\1/')
          echo "title=$MILESTONE" >> "$GITHUB_OUTPUT"

      - name: Move Beta issues to Done
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          BETA_OPTION_ID: ${{ vars.PROJECT_STATUS_BETA_ID }}
          DONE_OPTION_ID: ${{ vars.PROJECT_STATUS_DONE_ID }}
          MILESTONE: ${{ steps.milestone.outputs.title }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          python3 scripts/setup/promote_status.py
