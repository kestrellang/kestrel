name: Project Status

# Single source of truth for moving Project cards as PRs flow through the
# release train. The selector depends on what merged where:
#   topic   -> nightly   the issues that PR closes        -> Nightly
#   nightly -> beta       every card in the Nightly column -> Beta   (bulk)
#   beta    -> main       every card in the Beta column    -> Done   (bulk)
#   fix     -> main       the issues that PR closes        -> Done
# Promotion / forward-merge PRs close no issues, so the closing-issue selector
# is a natural no-op for them; the head branch is what flags a bulk promotion.
# See docs/contributing/git.md for the board model.
#
# Skipped silently if `vars.PROJECT_ID` is unset (forks, or before the Project
# is wired up).

on:
  pull_request:
    types: [ready_for_review, closed]

permissions:
  contents: read

jobs:
  update:
    if: ${{ vars.PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Resolve mode + target
        id: plan
        env:
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          BASE: ${{ github.event.pull_request.base.ref }}
          IN_REVIEW: ${{ vars.PROJECT_STATUS_IN_REVIEW_ID }}
          NIGHTLY: ${{ vars.PROJECT_STATUS_NIGHTLY_ID }}
          BETA: ${{ vars.PROJECT_STATUS_BETA_ID }}
          DONE: ${{ vars.PROJECT_STATUS_DONE_ID }}
        run: |
          set -euo pipefail
          mode=none; status=""; src=""; tgt=""
          if [ "$ACTION" = "ready_for_review" ]; then
            mode=closing; status="$IN_REVIEW"
          elif [ "$MERGED" = "true" ]; then
            case "$BASE" in
              nightly)
                mode=closing; status="$NIGHTLY" ;;
              beta)
                if [ "$HEAD" = "nightly" ]; then
                  mode=bulk; src="$NIGHTLY"; tgt="$BETA"
                else
                  mode=closing; status="$BETA"
                fi ;;
              main)
                if [ "$HEAD" = "beta" ]; then
                  mode=bulk; src="$BETA"; tgt="$DONE"
                else
                  mode=closing; status="$DONE"
                fi ;;
            esac
          fi
          {
            echo "mode=$mode"
            echo "status=$status"
            echo "src=$src"
            echo "tgt=$tgt"
          } >> "$GITHUB_OUTPUT"

      - name: Move the issues this PR closes
        if: ${{ steps.plan.outputs.mode == 'closing' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          TARGET: ${{ steps.plan.outputs.status }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python3 scripts/setup/set_status.py --by-closing-issues

      - name: Promote a whole status column
        if: ${{ steps.plan.outputs.mode == 'bulk' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          SOURCE_OPTION_ID: ${{ steps.plan.outputs.src }}
          TARGET_OPTION_ID: ${{ steps.plan.outputs.tgt }}
        run: python3 scripts/setup/set_status.py --by-status
